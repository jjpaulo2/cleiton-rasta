services:

  bot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER: ${USER}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      DISCORD_ADMIN_ROLE_ID: ${DISCORD_ADMIN_ROLE_ID}
      DISCORD_NOTIFICATIONS_CHANNEL_ID: ${DISCORD_NOTIFICATIONS_CHANNEL_ID}
      DISCORD_MESSAGES_CHANNEL_ID: ${DISCORD_MESSAGES_CHANNEL_ID}
      DISCORD_MUSIC_CHANNEL_ID: ${DISCORD_MUSIC_CHANNEL_ID}
      PORTAINER_API_URL: ${PORTAINER_API_URL}
      PORTAINER_API_KEY: ${PORTAINER_API_KEY}
      PORTAINER_MANAGER_NODE_ENDPOINT_ID: ${PORTAINER_MANAGER_NODE_ENDPOINT_ID}
      PORTAINER_HEAVY_NODE_ENDPOINT_ID: ${PORTAINER_HEAVY_NODE_ENDPOINT_ID}
      CLUSTER_HEAVY_NODE_ID: ${CLUSTER_HEAVY_NODE_ID}
      MINECRAFT_DOMAIN_NAME: ${MINECRAFT_DOMAIN_NAME}
      MINECRAFT_PASSWORD: ${MINECRAFT_PASSWORD}
